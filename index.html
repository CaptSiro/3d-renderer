<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>PGR</title>

    <link rel="stylesheet" href="/assets/style.css">
    <script src="https://git.io/glm-js.min.js"></script>
</head>
<body>
    <main>
        <canvas id="viewport"></canvas>

        <div class="time-controls">
            <button class="play">
                <x-icon src="nf-md-play" placeholder="&gt;"></x-icon>
            </button>
            
            <button class="pause">
                <x-icon src="nf-md-pause" placeholder="||"></x-icon>
            </button>
            
            <label class="time-input">
                <code>[Time]:</code>
                <input type="range" min="0" max="1" step="0.01">
            </label>
        </div>

        <div class="stats hide">
            <code class="fps">0 fps</code>
            <code class="update">update: 0</code>
            <code class="render">render: 0</code>
            <code class="day-time">time-day: 0</code>
        </div>
    </main>

    <script type="module" src="/src/main.ts"></script>
</body>
</html>
